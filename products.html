<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Coffee & Co. — Our Products</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="products.css">
</head>
<body>

  <nav class="navbar">
    <div class="logo-circle">C</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="products.html">Products</a></li>
      <li><a href="contacts.html">Contact</a></li>
    </ul>
    <div class="nav-right">
      <a href="#" class="order-btn">ORDER NOW</a>
    </div>
  </nav>

  <section class="products-grid">
    <div class="product-card">
      <div class="product-image">
        <img src="0.png" alt="CLASSIC">
      </div>
      <div class="product-info">
        <h3>Classic</h3>
        <p class="price">25.50</p>
        <button class="add-to-cart">MORE</button>
      </div>
    </div>
    <div class="product-card">
      <div class="product-image">
        <img src="1.png" alt="Caramel">
      </div>
      <div class="product-info">
        <h3>Christmas</h3>
        <p class="price">25.50</p>
        <button class="add-to-cart">MORE</button>
      </div>
    </div>
    <div class="product-card">
      <div class="product-image">
        <img src="2.png" alt="Strawberry">
      </div>
      <div class="product-info">
        <h3>Valentine</h3>
        <p class="price">25.50</p>
        <button class="add-to-cart">MORE</button>
      </div>
    </div>
    <div class="product-card">
      <div class="product-image">
        <img src="3.png" alt="KIDS">
      </div>
      <div class="product-info">
        <h3>KIDS</h3>
        <p class="price">25.50</p>
        <button class="add-to-cart">MORE</button>
      </div>
    </div>
    <div class="product-card">
      <div class="product-image">
        <img src="4.png" alt="EASTER">
      </div>
      <div class="product-info">
        <h3>EASTER</h3>
        <p class="price">25.50</p>
        <button class="add-to-cart">MORE</button>
      </div>
    </div>
  </section>

  <div id="product-modal" class="modal">
    <div class="modal-content">
      <span class="close-button">&times;</span>
      <div class="modal-body">
        <img id="modal-img" src="" alt="Product Image">
        <div class="modal-text">
          <h3 id="modal-title"></h3>
          <p id="modal-description"></p>
          <button class="add-to-cart modal-add-to-cart">Add to Cart</button>
        </div>
      </div>
    </div>
  </div>

  <script src="products.js"></script>
</body>
</html>
